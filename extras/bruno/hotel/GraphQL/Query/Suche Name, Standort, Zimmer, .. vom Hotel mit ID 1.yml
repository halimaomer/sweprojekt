info:
  name: Suche name, standort, zimmer, ... vom Hotel mit ID 1
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphqlUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    query: |-
      query ($hotelId: ID! = "1") {
        hotel(hotelId: $hotelId) {
          id
          name
          standort {
            strasse
            hausnummer
            plz
            ort
            land
          }
          zimmer {
            preis
            zimmernummer
          }
          erzeugt
          aktualisiert
        }
      }
    variables: |-
      {
        "hotelId": "20"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.data.hotel
      operator: isJson
    - expression: res.body.data.hotel.id
      operator: gte
      value: "0"
    - expression: res.body.data.hotel.name
      operator: isString
    - expression: res.body.data.hotel.name
      operator: isNotEmpty
    - expression: res.body.data.hotel.standort
      operator: isJson
    - expression: res.body.data.hotel.zimmer
      operator: isArray

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
