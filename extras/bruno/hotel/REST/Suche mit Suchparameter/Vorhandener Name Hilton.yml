info:
  name: Vorhandener Name Hilton
  type: http
  seq: 3

http:
  method: GET
  url: "{{restUrl}}?name=Hilton"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: name
      value: Hilton
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Body: Name "Hilton" und ID > 0', () => {
          res.getBody()
            .content
            .forEach(hotel => {
              const { name, id } = hotel;
              expect(name).to.be.equal('Hilton');
              expect(id).to.be.above(0);
            });
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.content
      operator: isArray
    - expression: res.body.content
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
