info:
  name: Neues Hotel
  type: http
  seq: 1

http:
  method: POST
  url: "{{restUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    type: json
    data: |-
      {
        "name": "Hotel HKA",
        "standort": {
          "strasse": "Hauptstrasse",
          "hausnummer": "1",
          "plz": "76133",
          "ort": "Karlsruhe",
          "land": "Deutschland"
        },
        "zimmer": [
          {
            "preis": "99.99",
            "zimmernummer": "101"
          }
        ]
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.headers.location
      operator: matches
      value: \/rest\/[1-9]\d*$
    - expression: res.body
      operator: isString
    - expression: res.body
      operator: isEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5