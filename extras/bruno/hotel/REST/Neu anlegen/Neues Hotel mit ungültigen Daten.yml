info:
  name: Neues Hotel mit ungültigen Daten
  type: http
  seq: 3

http:
  method: POST
  url: "{{restUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    type: json
    data: |-
      {
        "name": "",
        "standort": {
          "strasse": "",
          "hausnummer": "",
          "plz": "123",
          "ort": "",
          "land": ""
        },
        "zimmer": [
          {
            "preis": "-10",
            "zimmernummer": ""
          }
        ]
      }
  auth:
    type: bearer
    token: "{{TOKEN}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Fehlermeldungen im Response Body', () => {
            const body = res.getBody();
            const props = ['name', 'standort', 'zimmer'];

            // FastAPI
            if (Object.keys(body).length === 1 && Array.isArray(body.detail)) {
                expect(body.detail).to.be.a('array').that.is.not.empty;
                const detailLoc = body.detail.map(elem => elem.loc[1]);
                expect(detailLoc).to.be.an('array').that.has.a.lengthOf(props.length).to.have.deep.members(props);
                return;
            }

            // Flask
            //expect(Object.keys(body)).to.be.an('array').that.has.a.lengthOf(props.length);
            //props.forEach(prop => {
            //    const violations = body[prop];
            //    const violationsType = typeof violations;
            //    expect(violationsType).to.be.oneOf(['array', 'object']);
            //});
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "422"
    - expression: res.headers['content-type']
      operator: eq
      value: application/json
    - expression: res.body.detail
      operator: isArray
    - expression: res.body.detail
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
