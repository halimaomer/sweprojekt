info:
  name: Neues Hotel mit bereits existierendem Standort
  type: http
  seq: 3

http:
  method: POST
  url: "{{restUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    type: json
    data: |-
      {
        "name": "Hotel Doppelstandort",
        "standort": {
          "strasse": "Hauptstrasse",
          "hausnummer": "1",
          "plz": "76133",
          "ort": "Karlsruhe",
          "land": "Deutschland"
        },
        "zimmer": [
          {
            "preis": "120.00",
            "zimmernummer": "102"
          }
        ]
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "422"
    - expression: res.body.detail
      operator: contains
      value: Standort

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
